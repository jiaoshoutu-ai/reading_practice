<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
    <title>大模型配置 - 初中现代文阅读专题课程</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px 30px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: 500;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        .settings-card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .settings-card h1 {
            color: #333;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .settings-card .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-group input[type="text"],
        .form-group input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group input.error {
            border-color: #f44336;
        }

        .error-message {
            color: #f44336;
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-right: 10px;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #666;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-danger {
            background: #f44336;
        }

        .btn-danger:hover {
            background: #d32f2f;
        }

        .status-box {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        .status-box.success {
            background: #e8f5e9;
            border: 1px solid #4caf50;
            color: #2e7d32;
        }

        .status-box.error {
            background: #ffebee;
            border: 1px solid #f44336;
            color: #c62828;
        }

        .status-box.info {
            background: #e3f2fd;
            border: 1px solid #2196f3;
            color: #1565c0;
        }

        .api-key-display {
            background: #f5f7fa;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 25px;
            font-family: monospace;
            font-size: 0.95rem;
            color: #333;
        }

        .security-tips {
            background: #fff8e1;
            border-left: 4px solid #ffb74d;
            padding: 20px;
            border-radius: 0 8px 8px 0;
            margin-top: 25px;
        }

        .security-tips h4 {
            color: #f57c00;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .security-tips ul {
            margin-left: 20px;
            color: #666;
            font-size: 0.9rem;
            line-height: 1.8;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <a href="index.html">&larr; 返回首页</a>
        </nav>

        <div class="settings-card">
            <h1>🤖 大模型配置</h1>
            <p class="subtitle">配置 DeepSeek API Key 以使用 AI 辅助功能</p>

            <!-- 状态提示框 -->
            <div id="status-box" class="status-box hidden"></div>

            <!-- API Key 显示区域（已保存时） -->
            <div id="api-key-display" class="api-key-display hidden">
                <strong>当前 API Key：</strong>
                <span id="api-key-masked">sk-••••••••••••xxxx</span>
            </div>

            <!-- 输入表单 -->
            <div class="form-group">
                <label for="api-key-input">DeepSeek API Key</label>
                <input
                    type="password"
                    id="api-key-input"
                    placeholder="请输入你的 API Key，格式如 sk-xxxxxxxx"
                    autocomplete="off"
                >
                <p id="error-message" class="error-message">请输入有效的 API Key</p>
            </div>

            <!-- 显示/隐藏切换 -->
            <div class="form-group">
                <label style="display: flex; align-items: center; cursor: pointer;">
                    <input
                        type="checkbox"
                        id="toggle-visibility"
                        style="width: auto; margin-right: 8px;"
                    >
                    <span style="color: #666; font-size: 0.9rem;">显示 API Key 明文</span>
                </label>
            </div>

            <!-- 按钮 -->
            <div>
                <button class="btn" id="save-btn" onclick="saveApiKey()">保存设置</button>
                <button class="btn btn-danger hidden" id="delete-btn" onclick="deleteApiKey()">删除 Key</button>
                <button class="btn btn-secondary" onclick="testConnection()">测试连接</button>
            </div>

            <!-- 安全提示 -->
            <div class="security-tips">
                <h4>🔒 安全说明</h4>
                <ul>
                    <li>API Key 仅存储在您的本地浏览器中，不会上传到任何服务器</li>
                    <li>只有您本人可以访问此浏览器时才能使用 API Key</li>
                    <li>建议定期更换 API Key 以保证安全</li>
                    <li>不要在公共电脑上保存 API Key</li>
                    <li>本站用户输入不存储，不展示给他人，无 XSS 注入风险</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        const API_KEY_STORAGE = 'deepseek_api_key';

        // 页面加载时检查是否已有 API Key
        window.onload = function() {
            const savedKey = localStorage.getItem(API_KEY_STORAGE);
            if (savedKey) {
                showSavedState(savedKey);
            }
        };

        // 显示已保存状态
        function showSavedState(key) {
            const masked = maskApiKey(key);
            document.getElementById('api-key-display').classList.remove('hidden');
            document.getElementById('api-key-masked').textContent = masked;
            document.getElementById('delete-btn').classList.remove('hidden');
            document.getElementById('api-key-input').value = '';
            showStatus('已保存 API Key', 'info');
        }

        // 隐藏 API Key（只显示前后缀）
        function maskApiKey(key) {
            if (key.length <= 10) return '••••••••';
            return key.substring(0, 4) + '••••••••••••' + key.substring(key.length - 4);
        }

        // 显示状态提示
        function showStatus(message, type) {
            const statusBox = document.getElementById('status-box');
            statusBox.textContent = message;
            statusBox.className = 'status-box ' + type;
            statusBox.classList.remove('hidden');

            // 3 秒后自动隐藏（如果是成功提示）
            if (type === 'success') {
                setTimeout(() => {
                    statusBox.classList.add('hidden');
                }, 3000);
            }
        }

        // 验证 API Key 格式
        function validateApiKey(key) {
            if (!key || key.trim().length === 0) {
                return { valid: false, message: 'API Key 不能为空' };
            }
            if (!key.startsWith('sk-')) {
                return { valid: false, message: 'API Key 格式错误，应以 sk- 开头' };
            }
            if (key.length < 10) {
                return { valid: false, message: 'API Key 长度过短' };
            }
            return { valid: true };
        }

        // 保存 API Key
        function saveApiKey() {
            const input = document.getElementById('api-key-input');
            const key = input.value.trim();

            // 验证
            const validation = validateApiKey(key);
            if (!validation.valid) {
                input.classList.add('error');
                document.getElementById('error-message').textContent = validation.message;
                document.getElementById('error-message').classList.add('show');
                return;
            }

            // 保存到 localStorage
            localStorage.setItem(API_KEY_STORAGE, key);

            // 清空输入框
            input.value = '';
            input.classList.remove('error');
            document.getElementById('error-message').classList.remove('show');

            // 更新 UI
            showSavedState(key);
            showStatus('API Key 已保存', 'success');
        }

        // 删除 API Key
        function deleteApiKey() {
            if (confirm('确定要删除已保存的 API Key 吗？')) {
                localStorage.removeItem(API_KEY_STORAGE);
                document.getElementById('api-key-display').classList.add('hidden');
                document.getElementById('delete-btn').classList.add('hidden');
                showStatus('API Key 已删除', 'success');
            }
        }

        // 测试连接
        async function testConnection() {
            const key = localStorage.getItem(API_KEY_STORAGE);

            if (!key) {
                showStatus('请先保存 API Key', 'error');
                return;
            }

            const btn = document.getElementById('save-btn');
            const originalText = btn.textContent;
            btn.textContent = '测试中...';
            btn.disabled = true;

            try {
                const response = await fetch('https://api.deepseek.com/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${key}`,
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: [
                            { role: 'system', content: 'You are a helpful assistant.' },
                            { role: 'user', content: 'Hello' }
                        ],
                        max_tokens: 10,
                    }),
                });

                if (response.ok) {
                    showStatus('连接测试成功！API Key 有效', 'success');
                } else {
                    const error = await response.json();
                    showStatus('连接失败：' + (error.error?.message || '未知错误'), 'error');
                }
            } catch (error) {
                showStatus('网络错误：' + error.message, 'error');
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }

        // 切换显示/隐藏 API Key
        document.getElementById('toggle-visibility').addEventListener('change', function(e) {
            const input = document.getElementById('api-key-input');
            input.type = e.target.checked ? 'text' : 'password';
        });
    </script>
</body>
</html>
